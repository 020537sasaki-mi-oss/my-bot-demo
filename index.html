<div id="myChatButton" style="
    position: fixed; 
    bottom: 25px; 
    right: 25px; 
    cursor: pointer; 
    z-index: 9999;
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));">

  <div style="
      width: 65px; 
      height: 65px; 
      background-color: #4285f4; 
      border-radius: 50%; /* ここを正円に固定 */
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 30px; 
      position: relative;">
    <span style="color: white;">💬</span>

    <div style="
        position: absolute;
        bottom: -2px;
        right: 5px;
        width: 20px;
        height: 20px;
        background-color: #4285f4;
        /* 三角形を作るためのクリップ */
        clip-path: polygon(0 0, 100% 0, 100% 100%);
        transform: rotate(10deg);">
    </div>
  </div>
</div>

<gen-search-widget
  configId="5f5ca5b8-1cb4-464f-8202-2e24e82d913e"
  triggerId="myChatButton">
</gen-search-widget>
