<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI検索 完成版</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f5f5f5; }
        .main-wrapper { max-width: 600px; margin: 0 auto; }
        .search-box {
            width: 100%; padding: 15px; font-size: 16px;
            border: 2px solid #4285F4; border-radius: 8px;
            box-sizing: border-box; margin-bottom: 15px; outline: none;
        }
        .ai-result-window {
            width: 100%; height: 600px; border: 1px solid #ddd;
            border-radius: 8px; background-color: white; overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <h2 style="text-align: center;">社内AI検索</h2>
        
        <input type="text" id="myInput" class="search-box" placeholder="質問を入力してEnter...">
        
        <div class="ai-result-window">
            <gen-search-widget
              id="myWidget"
              configId="5f5ca5b8-1cb4-464f-8202-2e24e82d913e"
              display-mode="inline">
            </gen-search-widget>
        </div>
    </div>

    <script src="https://cloud.google.com/ai/gen-app-builder/client?hl=ja"></script>

    <script>
        const input = document.getElementById('myInput');
        const widget = document.getElementById('myWidget');

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const query = input.value;
                if (!query) return;

                console.log("送信中:", query);

                try {
                    // ウィジェットに検索を実行させる
                    if (widget && typeof widget.search === 'function') {
                        await widget.search(query);
                    } else {
                        widget.setAttribute('search-query', query);
                    }
                    console.log("送信完了");
                } catch (err) {
                    console.error("エラー:", err);
                }
            }
        });
    </script>
</body>
</html>
