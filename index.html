<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>チャットボタン</title>
</head>
<body>

<!-- 吹き出しボタン -->
<div id="myChatButton" style="
    position: fixed; 
    bottom: 20px; 
    right: 20px; 
    padding: 12px 18px;
    background-color: #4285f4; 
    border-radius: 20px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    font-size: 20px; 
    color: white;
    cursor: pointer; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    z-index: 9999;
">
  💬
  
  <!-- しっぽ -->
  <span style="
    position: absolute;
    bottom: -8px;
    right: 20px;
    width: 0;
    height: 0;
    border-top: 10px solid #4285f4;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
  "></span>
</div>

<!-- Gen App Builder ウィジェット -->
<gen-search-widget
  configId="5f5ca5b8-1cb4-464f-8202-2e24e82d913e"
  triggerId="myChatButton">
</gen-search-widget>

<!-- スクリプト -->
<script src="https://cloud.google.com/ai/gen-app-builder/client?hl=ja"></script>

</body>
</html>
