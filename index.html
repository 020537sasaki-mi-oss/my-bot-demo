<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI検索 完成版</title>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
        }

        .main-wrapper {
            max-width: 600px;
            margin: 0 auto;
        }

        .search-box {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
        }

        .ai-result-window {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            min-height: 100px;
        }
    </style>
</head>

<body>
    <div class="main-wrapper">
        <h2 style="text-align: center;">社内AI検索</h2>

        <input
            type="text"
            id="myInput"
            class="search-box"
            placeholder="質問を入力してEnter..."
        >

        <div id="resultArea" class="ai-result-window">
            ここに結果が表示されます
        </div>

        <!-- あなたのウィジェット -->
        <gen-search-widget id="searchWidget"></gen-search-widget>
    </div>

    <script>
        const input = document.getElementById("myInput");
        const widget = document.getElementById("searchWidget");
        const resultArea = document.getElementById("resultArea");

        input.addEventListener("keydown", async (e) => {
            if (e.key === "Enter") {
                const query = input.value.trim();
                if (!query) return;

                console.log("送信中:", query);

                // ローディング表示
                resultArea.innerText = "検索中...";

                try {
                    // ✅ 正しい分岐（どっちか1回だけ）
                    if (widget && typeof widget.search === "function") {
                        await widget.search(query);
                    } else {
                        widget.setAttribute("search-query", query);
                    }

                    console.log("送信完了");

                    // 入力クリア
                    input.value = "";

                } catch (err) {
                    console.error("エラー:", err);

                    // ユーザー向けエラー表示
                    resultArea.innerText = "エラーが発生しました";
                }
            }
        });
    </script>
</body>
</html>
