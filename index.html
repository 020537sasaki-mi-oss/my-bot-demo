<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>サイズ調整済み AI検索</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f5f5f5; }

        /* 1. 全体を中央に寄せ、幅を制限する */
        .main-wrapper {
            max-width: 600px; /* ここでお好みの横幅に調整できます */
            margin: 0 auto;
        }

        /* 2. 自作入力欄のデザイン */
        .search-box {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* 枠線が外にはみ出ない設定 */
            margin-bottom: 10px;
        }

        /* 3. ここが重要！結果が出る枠のサイズを固定する */
        .ai-result-window {
            width: 100%;
            height: 500px; /* ここでお好みの高さに調整できます */
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: white;
            overflow: hidden; /* 中身が暴れても外に出さない */
            position: relative;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <h2 style="text-align: center;">AI検索</h2>

        <input type="text" id="myTrigger" class="search-box" placeholder="質問を入力...">

        <script src="https://cloud.google.com/ai/gen-app-builder/client?hl=ja"></script>

        <div class="ai-result-window">
            <gen-search-widget
              configId="5f5ca5b8-1cb4-464f-8202-2e24e82d913e"
              display-mode="inline"
              triggerId="myTrigger">
            </gen-search-widget>
        </div>
    </div>

</body>
</html>
