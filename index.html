<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>巨大化防止版 AI検索</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f5f5f5; }

        /* 全体の横幅制限 */
        .main-wrapper { max-width: 600px; margin: 0 auto; }

        /* 自作入力欄 */
        .search-box {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        /* 結果が出る枠（ここを固定） */
        .ai-result-window {
            width: 100%;
            height: 500px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: white;
            position: relative;
            overflow: hidden;
        }

        /* 💡 巨大化を防ぐための「封印」設定 */
        /* Googleが勝手に作る全画面の背景（オーバーレイ）を消す */
        .df-search-overlay, 
        gen-search-widget-container,
        .df-messenger-wrapper {
            position: static !important;
            display: block !important;
        }

        /* もし全画面に広がろうとしたら、それを透明にするか非表示にする */
        div[class*="backdrop"], div[class*="overlay"] {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <h2 style="text-align: center;">AI検索</h2>

        <input type="text" id="myTrigger" class="search-box" placeholder="ここに入力してEnter...">

        <script src="https://cloud.google.com/ai/gen-app-builder/client?hl=ja"></script>

        <div class="ai-result-window">
            <gen-search-widget
              configId="5f5ca5b8-1cb4-464f-8202-2e24e82d913e"
              display-mode="inline"
              triggerId="myTrigger"
              search-ads-enabled="false">
            </gen-search-widget>
        </div>
    </div>

</body>
</html>
